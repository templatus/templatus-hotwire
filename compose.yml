x-app-base: &app_base
  build: .
  links:
    - db
    - redis
  environment: &app_environment
    APP_HOST: localhost
    ASSET_HOST: null
    FORCE_SSL: 'false'
    DB_HOST: db
    DB_PASSWORD: my-secret-database-password
    DB_USER: postgres
    # Example value - generate your own with `bin/rails secret`
    SECRET_KEY_BASE: something-long-and-secret
    HONEYBADGER_API_KEY: null
    PLAUSIBLE_URL: null
    LOCKUP_CODEWORD: null
    # One Redis database per purpose, identical for every container: the web
    # container enqueues into the same database the worker polls, and clearing
    # the cache (FLUSHDB) can't take the job queues down with it.
    REDIS_CACHE_URL: redis://redis:6379/0
    REDIS_CABLE_URL: redis://redis:6379/1
    REDIS_QUEUE_URL: redis://redis:6379/2

services:
  db:
    environment:
      POSTGRES_PASSWORD: my-secret-database-password
    networks:
      - internal
    image: postgres:18-alpine
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
    volumes:
      - postgresql:/var/lib/postgresql/data

  redis:
    networks:
      - internal
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
    volumes:
      - redis:/data

  worker:
    <<: *app_base
    networks:
      - internal
    command: bundle exec sidekiq
    healthcheck:
      test: 'ps ax | grep -v grep | grep sidekiq'

  cable:
    <<: *app_base
    command: bundle exec puma -p 28080 cable/config.ru
    healthcheck:
      test: ['CMD-SHELL', 'nc -z 127.0.0.1 28080 || exit 1']
    networks:
      - public
      - internal

  app:
    <<: *app_base
    ports:
      - 3000
    healthcheck:
      test: ['CMD', 'wget', '--spider', 'http://127.0.0.1:3000/up']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - public
      - internal

volumes:
  postgresql:
  redis:

networks:
  public:
    external: true
  internal:
    driver_opts:
      encrypted: ''
